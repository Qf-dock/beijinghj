<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 北京欢迎你</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <div class="nav-wrap">
        <a href="index.html" class="logo">北京</a>
        <ul class="nav-list">
            <li><a href="index.html">首页</a></li>
            <li><a href="attractions.html">景点介绍</a></li>
            <li><a href="food.html">美食介绍</a></li>
            <li><a href="culture.html">民风民俗</a></li>
            <li><a href="contact.html" class="active">联系我们</a></li>
        </ul>
    </div>
</header>

<div class="container">
    <h2 class="page-title">联系我们</h2>
    <div class="contact-box">
        <p class="contact-desc">如果您对北京旅游有任何问题或建议，欢迎填写下方表单与我们联系，我们会尽快回复您。</p>
        <form id="contactForm" class="form-box">
            <div class="form-item">
                <label for="name">您的姓名：</label>
                <input type="text" id="name" placeholder="请输入您的姓名">
                <span class="tip"></span>
            </div>
            <div class="form-item">
                <label for="email">电子邮箱：</label>
                <input type="email" id="email" placeholder="请输入您的邮箱">
                <span class="tip"></span>
            </div>
            <div class="form-item">
                <label for="phone">联系电话：</label>
                <input type="tel" id="phone" placeholder="请输入您的手机号">
                <span class="tip"></span>
            </div>
            <div class="form-item">
                <label for="message">留言内容：</label>
                <textarea id="message" rows="5" placeholder="请输入您的留言（选填）"></textarea>
            </div>
            <button type="submit" class="submit-btn">提交留言</button>
        </form>
    </div>
</div>

<footer>
    <p>北京旅游介绍网站 ©2026 | 欢迎来到美丽的北京</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
